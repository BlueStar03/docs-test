# Language configuration for code block title bars
# Each key matches the kramdown/rouge language identifier lowercase.
# - icon: emoji, SVG, or HTML markup inserted with innerHTML.
# - color: CSS color value used to tint the language badge.
#
# Missing entries use the default badge.

javascript: &javascript
  icon: '<img alt="JavaScript" src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/javascript/javascript-original.svg" width="16" height="16">'
  color: "#f7df1e"
js:
  <<: *javascript

typescript: &typescript
  icon: '<img alt="TypeScript" src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/typescript/typescript-original.svg" width="16" height="16">'
  color: "#3178c6"
ts:
  <<: *typescript


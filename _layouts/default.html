<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <!-- Apply theme BEFORE any rendering to avoid flash -->
  <script>
    (function () {
      var pref = localStorage.getItem('theme-preference');
      var theme = pref || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/markdown.css' | relative_url }}">

  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Mermaid for diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  {% seo %}
</head>
<body>

  <div class="backdrop" data-action="close-panels"></div>

  {% include topbar.html %}

  <aside id="site-panel" class="site-panel" aria-label="Site navigation">
    {% include site-panel.html %}
  </aside>

  <aside id="toc-panel" class="toc-panel" aria-label="Table of contents">
    {% include toc-panel.html %}
  </aside>

  <main id="main-content" class="main-content">
    <article class="markdown-body">
      {{ content }}
    </article>
  </main>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/site-nav.js' | relative_url }}" defer></script>

  <!-- TOC config (frontmatter overrides _config.yml; both optional) -->
  <script>
    window.TOC = {
      enabled: {% if page.toc == false %}false{% elsif page.toc == true %}true{% elsif site.toc.enabled == false %}false{% else %}true{% endif %},
      minLevel: {{ page.toc_min_level | default: site.toc.min_level | default: 2 }},
      maxLevel: {{ page.toc_max_level | default: site.toc.max_level | default: 3 }}
    };
  </script>
  <script src="{{ '/assets/js/toc.js' | relative_url }}" defer></script>

  <!-- Admonitions config (from _data/admonitions.yml) -->
  <script>
    window.ADMONITIONS = {{ site.data.admonitions | jsonify }};
  </script>
  <script src="{{ '/assets/js/github-alerts.js' | relative_url }}" defer></script>

  <!-- Languages config (from _data/languages.yml) -->
  <script>
    window.LANGUAGES = {{ site.data.languages | jsonify }};
    window.CODE_BLOCKS = {{ site.code_blocks | jsonify }};
  </script>
  <script src="{{ '/assets/js/gml-highlight.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/code-blocks.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/optional-syntax.js' | relative_url }}" defer></script>
</body>
</html>

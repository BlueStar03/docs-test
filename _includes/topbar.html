<header class="topbar">
  <button type="button"
          class="topbar-btn"
          data-action="toggle-site-panel"
          aria-label="Toggle site navigation"
          aria-controls="site-panel">
    <span class="topbar-icon">☰</span>
  </button>

  <a href="{{ '/' | relative_url }}" class="topbar-title">{{ site.title }}</a>

  <button type="button"
          class="topbar-btn topbar-theme-toggle"
          data-action="toggle-theme"
          aria-label="Toggle color theme">
    <svg class="theme-icon theme-icon-auto" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
      <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0Zm0 1.5v13a6.5 6.5 0 0 1 0-13Z"/>
    </svg>
    <svg class="theme-icon theme-icon-light" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
      <path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13Zm8-5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 16 8ZM3 8a.75.75 0 0 1-.75.75H.75a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 3 8Zm10.657-5.657a.75.75 0 0 1 0 1.061l-1.06 1.06a.75.75 0 1 1-1.061-1.06l1.06-1.06a.75.75 0 0 1 1.061 0Zm-8.485 8.485a.75.75 0 0 1 0 1.061l-1.06 1.06a.75.75 0 1 1-1.061-1.06l1.06-1.06a.75.75 0 0 1 1.061 0Zm8.485 1.061-1.06-1.06a.75.75 0 1 1 1.06-1.061l1.06 1.06a.75.75 0 1 1-1.06 1.061ZM5.172 4.404l-1.06-1.06a.75.75 0 1 1 1.06-1.061l1.061 1.06a.75.75 0 1 1-1.06 1.061Z"/>
    </svg>
    <svg class="theme-icon theme-icon-dark" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
      <path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Z"/>
    </svg>
  </button>

  <button type="button"
          class="topbar-btn"
          data-action="toggle-toc-panel"
          aria-label="Toggle table of contents"
          aria-controls="toc-panel">
    <span class="topbar-icon">📑</span>
  </button>
</header>

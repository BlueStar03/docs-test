<header class="topbar">
  <button type="button"
          class="topbar-btn topbar-logo"
          data-action="toggle-site-panel"
          aria-label="Toggle site navigation"
          aria-controls="site-panel">
    {%- if site.logo -%}
      <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" class="topbar-logo-img">
    {%- else -%}
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
    {%- endif -%}
  </button>

  <a href="#" class="topbar-title" aria-label="Scroll to top">{{ page.title | default: site.title }}</a>

  <button type="button"
          class="topbar-btn topbar-toc"
          data-action="toggle-toc-panel"
          aria-label="Toggle table of contents"
          aria-controls="toc-panel">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path d="M4 6h16M4 12h10M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
  </button>
</header>

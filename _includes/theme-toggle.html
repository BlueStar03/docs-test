<button type="button" class="panel-header-action theme-toggle" data-action="toggle-theme" aria-label="Toggle color theme">
  {%- if site.theme_icon_light -%}
    <span class="theme-icon theme-icon-light">{{ site.theme_icon_light }}</span>
  {%- else -%}
    <svg class="theme-icon theme-icon-light" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
      <circle cx="8" cy="8" r="3"/>
      <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            d="M8 1v2 M8 13v2 M1 8h2 M13 8h2 M3.1 3.1l1.4 1.4 M11.5 11.5l1.4 1.4 M3.1 12.9l1.4-1.4 M11.5 4.5l1.4-1.4"/>
    </svg>
  {%- endif -%}
  {%- if site.theme_icon_dark -%}
    <span class="theme-icon theme-icon-dark">{{ site.theme_icon_dark }}</span>
  {%- else -%}
    <svg class="theme-icon theme-icon-dark" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
      <path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Z"/>
    </svg>
  {%- endif -%}
</button>

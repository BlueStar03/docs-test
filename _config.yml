# Site
title: docs-test
description: Markdown rendering testbed for a custom Jekyll theme
author: zBuLe
url: ""
baseurl: "/docs-test"

# Optional: site logo shown as the topbar nav-toggle button and in the
# site-panel header. Path relative to site root. Falls back to a
# hamburger icon when unset.
# logo: /assets/images/logo.svg

# Optional: override theme toggle icons. Accepts emoji or any HTML
# (e.g. an inline <svg>). Falls back to the built-in SVG sun/moon.
# theme_icon_light: "☀️"
# theme_icon_dark:  "🌙"

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false

# Collections (uncomment when you start organizing docs)
# collections:
#   docs:
#     output: true
#     permalink: /:collection/:path/

# Defaults — every page gets the default layout unless it sets one
defaults:
  - scope:
      path: ""
    values:
      layout: default

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jemoji

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - node_modules/
  - .jekyll-cache/

code_blocks:
  window_style: macos    # windows | macos | linux
  line_numbers: true    # default for all blocks
  zebra: true
  gml: true             # enable client-side GML syntax highlighting

toc:
  enabled: true
  min_level: 2
  max_level: 3

# Breadcrumbs — auto-generated from each page's URL.
# Disable globally below, or per-page with `breadcrumbs: false` in front matter.
# Override pretty names per URL segment in _data/breadcrumb_titles.yml.
breadcrumbs: true
breadcrumbs_exclude: ["assets", "images", "tags"]